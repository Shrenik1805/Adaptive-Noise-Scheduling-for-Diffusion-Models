name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r adaptive_diffusion/requirements.txt

      - name: Install black
        run: python -m pip install black

      - name: Lint (black --check)
        run: python -m black --check adaptive_diffusion scripts

      - name: Run tests
        run: python -m pytest adaptive_diffusion/tests -v --tb=short
